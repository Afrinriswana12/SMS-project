<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Details</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
<div class="page-shell">
  <aside class="sidebar">
    <div class="brand"><div class="brand-icon"><i class="fa-solid fa-graduation-cap"></i></div><div class="brand-text">SMS Dashboard</div></div>
    <a class="nav-link" href="dashboard.html"><i class="fa-regular fa-chart-bar"></i> Dashboard</a>
    <a class="nav-link" href="students.html"><i class="fa-solid fa-people-group"></i> Students</a>
    <a class="nav-link" href="addStudent.html"><i class="fa-solid fa-plus"></i> Add Student</a>
    <a class="nav-link" href="departments.html"><i class="fa-solid fa-building-columns"></i> Departments</a>
    <a class="nav-link" href="reports.html"><i class="fa-regular fa-file-lines"></i> Reports</a>
    <a class="nav-link" href="profile.html"><i class="fa-solid fa-user"></i> Profile</a>
    <a class="nav-link" href="settings.html"><i class="fa-solid fa-gear"></i> Settings</a>
    <a class="nav-link" href="login.html"><i class="fa-solid fa-arrow-right-from-bracket"></i> Logout</a>
  </aside>
  <main class="main-content">
    <div class="page-header"><div><h1 class="page-title">Student Details</h1><p class="page-description">View student academic and contact information.</p></div></div>
    <div class="page-card" style="display:grid;grid-template-columns:280px 1fr;gap:24px;">
      <div style="padding:24px;background:#EEF2FF;border-radius:24px;">
        <div style="width:120px;height:120px;border-radius:24px;background:#fff;display:grid;place-items:center;margin-bottom:20px;">
          <i class="fa-solid fa-user-graduate" style="font-size:3rem;color:#4F46E5"></i>
        </div>
        <h2 id="detailName" style="margin:0 0 6px;">Student Name</h2>
        <p id="detailStatus" style="margin:0;color:#16A34A;font-weight:700;">Active</p>
        <div style="margin-top:24px;display:grid;gap:12px;">
          <button class="primary-btn" onclick="window.location.href='edit.html?id='+studentId">Edit Student</button>
          <button class="primary-btn" style="background:#FECACA;color:#B91C1C;" onclick="deleteStudent()">Delete Student</button>
          <button class="primary-btn" style="background:#E0E7FF;color:#3730A3;" onclick="window.location.href='students.html'">Back to List</button>
        </div>
      </div>
      <div style="display:grid;gap:18px;">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;">
          <div class="card"><p class="card-title">Register Number</p><p id="detailRegNo" class="card-value">N/A</p></div>
          <div class="card"><p class="card-title">Department</p><p id="detailDepartment" class="card-value">N/A</p></div>
          <div class="card"><p class="card-title">Course</p><p id="detailCourse" class="card-value">N/A</p></div>
          <div class="card"><p class="card-title">Year</p><p id="detailYear" class="card-value">N/A</p></div>
        </div>
        <div class="card-grid" style="grid-template-columns:1fr 1fr;">
          <div class="card"><p class="card-title">Email</p><p id="detailEmail" class="card-value">N/A</p></div>
          <div class="card"><p class="card-title">Phone</p><p id="detailPhone" class="card-value">N/A</p></div>
          <div class="card"><p class="card-title">Gender</p><p id="detailGender" class="card-value">N/A</p></div>
          <div class="card"><p class="card-title">Address</p><p id="detailAddress" class="card-value">N/A</p></div>
        </div>
      </div>
    </div>
  </main>
</div>
<div id="toast" class="toast"></div>
<script>
  const apiUrl = 'http://localhost:8083/api/students';
  let studentId;

  async function loadStudentDetails() {
    const params = new URLSearchParams(window.location.search);
    studentId = params.get('id');
    if (!studentId) {
      showToast('Missing student id');
      return;
    }
    try {
      const response = await fetch(`${apiUrl}/${studentId}`);
      if (!response.ok) throw new Error('Student not found');
      const student = await response.json();
      document.getElementById('detailName').textContent = student.name || 'Student';
      document.getElementById('detailStatus').textContent = student.status || 'Inactive';
      document.getElementById('detailRegNo').textContent = student.registerNumber || 'N/A';
      document.getElementById('detailDepartment').textContent = student.department || 'N/A';
      document.getElementById('detailCourse').textContent = student.course || 'N/A';
      document.getElementById('detailYear').textContent = student.year || 'N/A';
      document.getElementById('detailEmail').textContent = student.email || 'N/A';
      document.getElementById('detailPhone').textContent = student.phone || 'N/A';
      document.getElementById('detailGender').textContent = student.gender || 'N/A';
      document.getElementById('detailAddress').textContent = student.address || 'N/A';
    } catch (error) {
      showToast(error.message);
    }
  }

  async function deleteStudent() {
    if (!confirm('Delete this student?')) return;
    try {
      const response = await fetch(`${apiUrl}/${studentId}`, { method: 'DELETE' });
      if (!response.ok) throw new Error('Unable to delete student');
      showToast('Student deleted');
      setTimeout(() => { window.location.href = 'students.html'; }, 1200);
    } catch (error) {
      showToast(error.message);
    }
  }

  function showToast(message) {
    const toast = document.getElementById('toast');
    toast.textContent = message;
    toast.style.display = 'block';
    setTimeout(() => { toast.style.display = 'none'; }, 2800);
  }

  loadStudentDetails();
</script>
</body>
</html>
