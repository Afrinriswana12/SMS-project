<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reports</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
</head>
<body>
<div class="page-shell">
  <aside class="sidebar">
    <div class="brand"><div class="brand-icon"><i class="fa-solid fa-graduation-cap"></i></div><div class="brand-text">SMS Dashboard</div></div>
    <a class="nav-link" href="dashboard.html"><i class="fa-regular fa-chart-bar"></i> Dashboard</a>
    <a class="nav-link" href="students.html"><i class="fa-solid fa-people-group"></i> Students</a>
    <a class="nav-link" href="addStudent.html"><i class="fa-solid fa-plus"></i> Add Student</a>
    <a class="nav-link" href="departments.html"><i class="fa-solid fa-building-columns"></i> Departments</a>
    <a class="nav-link active" href="reports.html"><i class="fa-regular fa-file-lines"></i> Reports</a>
    <a class="nav-link" href="profile.html"><i class="fa-solid fa-user"></i> Profile</a>
    <a class="nav-link" href="settings.html"><i class="fa-solid fa-gear"></i> Settings</a>
    <a class="nav-link" href="login.html"><i class="fa-solid fa-arrow-right-from-bracket"></i> Logout</a>
  </aside>
  <main class="main-content">
    <div class="page-header"><h1 class="page-title">Reports</h1></div>
    <div class="card-grid">
      <div class="card"><p class="card-title">Total Students</p><p id="reportTotal" class="card-value">0</p></div>
      <div class="card"><p class="card-title">Active Students</p><p id="reportActive" class="card-value">0</p></div>
      <div class="card"><p class="card-title">Inactive Students</p><p id="reportInactive" class="card-value">0</p></div>
      <div class="card"><p class="card-title">Recent Registrations</p><p id="reportRecent" class="card-value">0</p></div>
    </div>
    <div class="page-card">
      <canvas id="reportsChart" height="150"></canvas>
    </div>
    <div class="page-card">
      <canvas id="reportsChart" height="150"></canvas>
    </div>
  </main>
</div>
<script>
  const apiUrl = 'http://localhost:8083/api/students';

  async function loadReportData() {
    try {
      const response = await fetch(apiUrl);
      const students = await response.json();
      const total = students.length;
      const active = students.filter((s) => s.status?.toLowerCase() === 'active').length;
      const inactive = students.filter((s) => s.status?.toLowerCase() !== 'active').length;
      document.getElementById('reportTotal').textContent = total;
      document.getElementById('reportActive').textContent = active;
      document.getElementById('reportInactive').textContent = inactive;
      document.getElementById('reportRecent').textContent = students.slice(-5).length;
      renderReportChart(active, inactive);
    } catch (error) {
      console.error(error);
    }
  }

  function renderReportChart(active, inactive) {
    const ctx = document.getElementById('reportsChart');
    new Chart(ctx, {
      type: 'bar',
      data: {
        labels: ['Active', 'Inactive'],
        datasets: [{
          label: 'Students',
          data: [active, inactive],
          backgroundColor: ['#4F46E5', '#A78BFA'],
          borderRadius: 16,
        }],
      },
      options: {
        plugins: { legend: { display: false } },
        scales: {
          y: { beginAtZero: true, grid: { color: 'rgba(15, 23, 42, 0.08)' } },
        },
      },
    });
  }

  loadReportData();
</script>
</body>
</html>
