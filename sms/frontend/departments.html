<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Departments</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
</head>
<body>
<div class="page-shell">
  <aside class="sidebar">
    <div class="brand"><div class="brand-icon"><i class="fa-solid fa-graduation-cap"></i></div><div class="brand-text">SMS Dashboard</div></div>
    <a class="nav-link" href="dashboard.html"><i class="fa-regular fa-chart-bar"></i> Dashboard</a>
    <a class="nav-link" href="students.html"><i class="fa-solid fa-people-group"></i> Students</a>
    <a class="nav-link" href="addStudent.html"><i class="fa-solid fa-plus"></i> Add Student</a>
    <a class="nav-link active" href="departments.html"><i class="fa-solid fa-building-columns"></i> Departments</a>
    <a class="nav-link" href="reports.html"><i class="fa-regular fa-file-lines"></i> Reports</a>
    <a class="nav-link" href="profile.html"><i class="fa-solid fa-user"></i> Profile</a>
    <a class="nav-link" href="settings.html"><i class="fa-solid fa-gear"></i> Settings</a>
    <a class="nav-link" href="login.html"><i class="fa-solid fa-arrow-right-from-bracket"></i> Logout</a>
  </aside>
  <main class="main-content">
    <div class="page-header"><h1 class="page-title">Departments</h1></div>
    <div class="card-grid">
      <div class="card"><p class="card-title">Computer Science</p><p id="csCount" class="card-value">0</p></div>
      <div class="card"><p class="card-title">Information Technology</p><p id="itCount" class="card-value">0</p></div>
      <div class="card"><p class="card-title">Artificial Intelligence</p><p id="aiCount" class="card-value">0</p></div>
      <div class="card"><p class="card-title">Electronics & Comm.</p><p id="eceCount" class="card-value">0</p></div>
    </div>
    <div class="page-card">
      <p class="card-title">Department Distribution</p>
      <canvas id="departmentChart" height="140"></canvas>
    </div>
  </main>
</div>
<script>
  const apiUrl = 'http://localhost:8083/api/students';

  async function loadDepartmentStats() {
    try {
      const response = await fetch(apiUrl);
      const students = await response.json();
      const counts = {
        CS: 0,
        IT: 0,
        AI: 0,
        ECE: 0,
        Others: 0,
      };
      students.forEach((student) => {
        const dept = (student.department || '').toUpperCase();
        if (counts[dept] !== undefined) {
          counts[dept] += 1;
        } else {
          counts.Others += 1;
        }
      });
      document.getElementById('csCount').textContent = counts.CS;
      document.getElementById('itCount').textContent = counts.IT;
      document.getElementById('aiCount').textContent = counts.AI;
      document.getElementById('eceCount').textContent = counts.ECE;
      renderChart(counts);
    } catch (error) {
      console.error(error);
    }
  }

  function renderChart(counts) {
    const ctx = document.getElementById('departmentChart');
    new Chart(ctx, {
      type: 'doughnut',
      data: {
        labels: ['CS', 'IT', 'AI', 'ECE', 'Others'],
        datasets: [{
          data: [counts.CS, counts.IT, counts.AI, counts.ECE, counts.Others],
          backgroundColor: ['#4F46E5', '#6366F1', '#8B5CF6', '#A78BFA', '#C7D2FE'],
          borderWidth: 0,
        }],
      },
      options: { plugins: { legend: { position: 'bottom' } } },
    });
  }

  loadDepartmentStats();
</script>
</body>
</html>
