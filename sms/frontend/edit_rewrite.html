<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Student</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
  <div class="page-shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-icon"><i class="fa-solid fa-graduation-cap"></i></div>
        <div class="brand-text">SMS Dashboard</div>
      </div>
      <a class="nav-link" href="dashboard.html"><i class="fa-regular fa-chart-bar"></i> Dashboard</a>
      <a class="nav-link" href="students.html"><i class="fa-solid fa-people-group"></i> Students</a>
      <a class="nav-link" href="addStudent.html"><i class="fa-solid fa-plus"></i> Add Student</a>
      <a class="nav-link" href="departments.html"><i class="fa-solid fa-building-columns"></i> Departments</a>
      <a class="nav-link" href="reports.html"><i class="fa-regular fa-file-lines"></i> Reports</a>
      <a class="nav-link" href="profile.html"><i class="fa-solid fa-user"></i> Profile</a>
      <a class="nav-link" href="settings.html"><i class="fa-solid fa-gear"></i> Settings</a>
      <a class="nav-link active" href="edit.html"><i class="fa-solid fa-pen-to-square"></i> Edit Student</a>
      <a class="nav-link" href="login.html"><i class="fa-solid fa-arrow-right-from-bracket"></i> Logout</a>
    </aside>
    <main class="main-content">
      <div class="page-header">
        <div>
          <h1 class="page-title">Edit Student</h1>
          <p class="page-description">Update student details quickly and safely.</p>
        </div>
        <a class="primary-btn" href="students.html"><i class="fa-solid fa-arrow-left"></i> Back to List</a>
      </div>
      <div class="card-grid">
        <div class="card"><p class="card-title">Student ID</p><p id="studentId" class="card-value">#N/A</p></div>
        <div class="card"><p class="card-title">Status</p><p id="editStatus" class="card-value">Loading...</p></div>
      </div>
      <form id="studentForm" class="page-card">
        <div class="field-grid">
          <div class="field-group">
            <label for="name">Full Name</label>
            <input id="name" class="input-field" type="text" placeholder="Enter full name" required>
          </div>
          <div class="field-group">
            <label for="regno">Register Number</label>
            <input id="regno" class="input-field" type="text" placeholder="Enter register number" required>
          </div>
          <div class="field-group">
            <label for="department">Department</label>
            <select id="department" class="select-field" required>
              <option value="" disabled>Select department</option>
              <option value="CS">Computer Science</option>
              <option value="IT">Information Technology</option>
              <option value="AI">Artificial Intelligence</option>
              <option value="ECE">Electronics & Communication</option>
            </select>
          </div>
          <div class="field-group">
            <label for="course">Course</label>
            <select id="course" class="select-field" required>
              <option value="" disabled>Select course</option>
              <option value="fsd">Full Stack Development</option>
              <option value="fe">Frontend Development</option>
              <option value="ai&ml">Artificial Intelligence & ML</option>
              <option value="be">Backend Development</option>
            </select>
          </div>
        </div>
        <div class="field-grid">
          <div class="field-group">
            <label for="year">Year</label>
            <select id="year" class="select-field" required>
              <option value="" disabled>Select year</option>
              <option value="y1">2026</option>
              <option value="y2">2027</option>
              <option value="y3">2028</option>
              <option value="y4">2029</option>
            </select>
          </div>
          <div class="field-group">
            <label for="email">Email</label>
            <input id="email" class="input-field" type="email" placeholder="Enter email" required>
          </div>
          <div class="field-group">
            <label for="phone">Phone</label>
            <input id="phone" class="input-field" type="tel" placeholder="Enter phone number" required>
          </div>
          <div class="field-group">
            <label for="status">Status</label>
            <select id="status" class="select-field" required>
              <option value="Active">Active</option>
              <option value="Inactive">Inactive</option>
            </select>
          </div>
        </div>
        <div class="field-grid">
          <div class="field-group" style="grid-column: 1 / -1;">
            <label>Gender</label>
            <div style="display:flex;gap:18px;flex-wrap:wrap;">
              <label class="label-grp"><input type="radio" name="gender" value="Male"> Male</label>
              <label class="label-grp"><input type="radio" name="gender" value="Female"> Female</label>
              <label class="label-grp"><input type="radio" name="gender" value="Other"> Other</label>
            </div>
          </div>
          <div class="field-group" style="grid-column: 1 / -1;">
            <label for="address">Address</label>
            <textarea id="address" class="input-field" placeholder="Enter address" required style="min-height:140px"></textarea>
          </div>
        </div>
        <div style="display:flex;justify-content:flex-end;gap:14px;flex-wrap:wrap;margin-top:8px;">
          <button type="reset" class="page-btn">Reset</button>
          <button id="updateButton" type="button" class="primary-btn">Update Student</button>
        </div>
      </form>
    </main>
  </div>
  <div id="toast" class="toast"></div>
  <script src="common.js"></script>
  <script src="editStudent.js"></script>
</body>
</html>
