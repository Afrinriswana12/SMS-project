<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
</head>
<body>
<div class="page-shell">
  <aside class="sidebar">
    <div class="brand"><div class="brand-icon"><i class="fa-solid fa-graduation-cap"></i></div><div class="brand-text">SMS Dashboard</div></div>
    <a class="nav-link active" href="dashboard.html"><i class="fa-regular fa-chart-bar"></i> Dashboard</a>
    <a class="nav-link" href="students.html"><i class="fa-solid fa-people-group"></i> Students</a>
    <a class="nav-link" href="addStudent.html"><i class="fa-solid fa-plus"></i> Add Student</a>
    <a class="nav-link" href="departments.html"><i class="fa-solid fa-building-columns"></i> Departments</a>
    <a class="nav-link" href="reports.html"><i class="fa-regular fa-file-lines"></i> Reports</a>
    <a class="nav-link" href="profile.html"><i class="fa-solid fa-user"></i> Profile</a>
    <a class="nav-link" href="settings.html"><i class="fa-solid fa-gear"></i> Settings</a>
    <a class="nav-link" href="login.html"><i class="fa-solid fa-arrow-right-from-bracket"></i> Logout</a>
  </aside>
  <main class="main-content">
    <div class="page-header">
      <div>
        <h1 class="page-title">Dashboard</h1>
        <p class="page-description">Summary of student registrations, departments and active records.</p>
      </div>
      <a href="addStudent.html" class="primary-btn"><i class="fa-solid fa-plus"></i> Add Student</a>
    </div>
    <div class="card-grid">
      <div class="card"><p class="card-title">Total Students</p><p id="totalStudents" class="card-value">0</p></div>
      <div class="card"><p class="card-title">Departments</p><p id="departmentCount" class="card-value">0</p></div>
      <div class="card"><p class="card-title">Active Students</p><p id="activeStudents" class="card-value">0</p></div>
      <div class="card"><p class="card-title">Recent Registrations</p><p id="recentStudents" class="card-value">0</p></div>
    </div>
    <div class="page-card">
      <canvas id="deptChart" height="120"></canvas>
    </div>
    <div class="page-card"><p class="card-title">Recent Student Registrations</p><div id="recentList"></div></div>
  </main>
</div>
<div id="toast" class="toast"></div>
<script>
  const apiUrl = 'http://localhost:8083/api/students';

  async function loadDashboard() {
    try {
      const response = await fetch(apiUrl);
      const students = await response.json();
      document.getElementById('totalStudents').textContent = students.length;
      const activeCount = students.filter(s => s.status?.toLowerCase() === 'active').length;
      document.getElementById('activeStudents').textContent = activeCount;
      const departments = [...new Set(students.map(s => s.department?.toUpperCase()).filter(Boolean))];
      document.getElementById('departmentCount').textContent = departments.length;
      const recentStudents = students.slice(-5);
      document.getElementById('recentStudents').textContent = recentStudents.length;
      renderChart(students);
      renderRecentList(recentStudents);
    } catch (error) {
      showToast('Unable to load dashboard');
    }
  }

  function renderChart(students) {
    const counts = students.reduce((acc, student) => {
      const key = student.department || 'Unknown';
      acc[key] = (acc[key] || 0) + 1;
      return acc;
    }, {});
    const labels = Object.keys(counts);
    const data = Object.values(counts);

    const ctx = document.getElementById('deptChart');
    new Chart(ctx, {
      type: 'doughnut',
      data: {
        labels,
        datasets: [{
          data,
          backgroundColor: ['#6366F1', '#4F46E5', '#8B5CF6', '#A78BFA', '#C7D2FE'],
          borderWidth: 0
        }]
      },
      options: {
        plugins: { legend: { position: 'bottom' } }
      }
    });
  }

  function renderRecentList(students) {
    const container = document.getElementById('recentList');
    container.innerHTML = students.map(student => `
      <div style="padding:14px 0;border-bottom:1px solid rgba(15,23,42,.08);">
        <strong>${student.name || 'Unknown'}</strong><br>
        <span style="color:#64748B;">${student.department || 'N/A'} • ${student.registerNumber || '—'}</span>
      </div>`).join('');
  }

  function showToast(message) {
    const toast = document.getElementById('toast');
    toast.textContent = message;
    toast.style.display = 'block';
    setTimeout(() => { toast.style.display = 'none'; }, 2800);
  }

  loadDashboard();
</script>
</body>
</html>
